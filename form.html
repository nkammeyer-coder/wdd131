<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="WDD 131 - Dynamic Web Fundamentals | Neal Kammeyer | Product Review">
    <meta name="author" content="Neal Kammeyer">

    <title>Product Review Form | WDD131</title>

    <link rel="stylesheet" href="styles/form.css">
    <script src="scripts/form.js" defer></script>
</head>
<body>
    <header>
        <h1>Product Review Form</h1>
    </header>

    <main>
        <form method="get" action="review.html">
            
            <label for="productName">Product Name</label>

            <select id="productName" name="productName" required>
                <option value="" disabled selected>
                    Select a Product ... 
                </option>
            </select>

           <fieldset>
                <legend>Overall Rating</legend>

                <input type="radio" id="rating1" name="rating" value="1" required>
                <label for="rating1">1 Star</label>

                <input type="radio" id="rating2" name="rating" value="2">
                <label for="rating2">2 Stars</label>

                <input type="radio" id="rating3" name="rating" value="3">
                <label for="rating3">3 Stars</label>

                <input type="radio" id="rating4" name="rating" value="4">
                <label for="rating4">4 Stars</label>

                <input type="radio" id="rating5" name="rating" value="5">
                <label for="rating5">5 Stars</label>
            </fieldset>
          
            <label for="dateInstalled">Date Installed</label>

            <input
                type="date"
                id="dateInstalled"
                name="dateInstalled"
                required>

            <fieldset>
                <legend>Useful Features</legend>

                <input type="checkbox" id="durability" name="features" value="Durability">
                <label for="durability">Durability</label>

                <input type="checkbox" id="performance" name="features" value="Performance">
                <label for="performance">Performance</label>

                <input type="checkbox" id="design" name="features" value="Design">
                <label for="design">Design</label>

                <input type="checkbox" id="easeOfUse" name="features" value="Ease of Use">
                <label for="easeOfUse">Ease of Use</label>

            </fieldset>
  
            <label for="writtenReview">Written Review</label>

            <textarea id="writtenReview" name="review"></textarea>
                   
            <label for="userName">Your Name</label>

            <input
                type="text"
                id="userName"
                name="userName">
                           
          <input type="submit" value="Submit your Review">         

        </form>
    </main>
    <footer>
        <p>
            &copy;
            <span id="currentyear"></span>
            Neal Kammeyer
        </p>

        <p id="lastModified"></p>
    </footer>
</body>
</html>
